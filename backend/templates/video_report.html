<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Scan Report</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Scan Report & Forensics</h1>
        <p class="subtitle">File: <span id="filename">Unknown</span></p>
        <div class="glass-card verdict-banner" id="verdict-banner">
            <div class="verdict-title" id="verdict-title">VERDICT: ANALYZING...</div>
            <div style="font-size: 0.9rem; margin-top: 5px;" id="verdict-reason">Processing results...</div>
        </div>
        <div class="glass-card forensic-layout" style="padding: 2rem; margin-top: 2rem;">
            <div style="text-align: center;">
                <div style="margin-bottom: 10px; color: #ccc;">Final Confidence Score</div>
                <div class="score-circle" id="score-circle">
                    <div class="score-inner" id="score-value">--%</div>
                </div>
                <div style="margin-top: 15px; font-weight: bold;" id="probability-label">Calculating...</div>
            </div>
            <div class="detailed-log" id="detailed-log" style="margin-top: 2rem;">
                [LOG] Loading analysis results...
            </div>
        </div>
        <br>
        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
            <button class="btn-glow" onclick="location.href='/video_dashboard'">Scan Another Video</button>
            <button class="btn-glow" onclick="location.href='/'">Back to Main Page</button>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const resultJson = sessionStorage.getItem('videoAnalysisResult');
        if (!resultJson) {
            document.getElementById('verdict-title').textContent = 'NO DATA';
            document.getElementById('verdict-reason').textContent = 'No analysis result found. Please scan a video first.';
            return;
        }
        const result = JSON.parse(resultJson);
        document.getElementById('filename').textContent = result.filename || 'Unknown';
        const verdictBanner = document.getElementById('verdict-banner');
        const verdictTitle = document.getElementById('verdict-title');
        const verdictReason = document.getElementById('verdict-reason');
        let isAI = false;
        let confidence = typeof result.confidence === 'number' ? result.confidence : 0;
        let label = result.label ? String(result.label).toUpperCase() : '';
        // Parse result text (e.g., "The video is FAKE. Confidence score: 62.3%")
        if ((!label || !confidence) && result.result) {
            const match = result.result.match(/(REAL|FAKE).*?([\d.]+)%/i);
            if (match) {
                label = match[1].toUpperCase();
                confidence = parseFloat(match[2]);
            }
        }
        isAI = (label === 'FAKE');
        if (isAI) {
            verdictTitle.textContent = 'VERDICT: AI-GENERATED';
            verdictBanner.style.borderColor = 'var(--neon-red)';
            verdictBanner.style.background = 'rgba(255, 42, 42, 0.1)';
        } else {
            verdictTitle.textContent = 'VERDICT: AUTHENTIC';
            verdictBanner.style.borderColor = 'var(--neon-green)';
            verdictBanner.style.background = 'rgba(0, 255, 136, 0.1)';
            verdictTitle.style.color = 'var(--neon-green)';
        }
        verdictReason.textContent = 'Video AI analysis completed';
        // Confidence score
        const scoreValue = document.getElementById('score-value');
        scoreValue.textContent = confidence.toFixed(1) + '%';
        scoreValue.style.color = isAI ? 'var(--neon-red)' : 'var(--neon-green)';
        const scoreCircle = document.getElementById('score-circle');
        scoreCircle.style.background = `conic-gradient(${isAI ? 'var(--neon-red)' : 'var(--neon-green)'} ${confidence}%, transparent 0)`;
        scoreCircle.style.boxShadow = isAI ? '0 0 20px rgba(255, 42, 42, 0.3)' : '0 0 20px rgba(0, 255, 136, 0.3)';
        // Probability label
        const probLabel = document.getElementById('probability-label');
        let probText = 'Low';
        if (confidence > 80) probText = 'Very High';
        else if (confidence > 60) probText = 'High';
        else if (confidence > 40) probText = 'Medium';
        probLabel.textContent = `Probability: ${probText}`;
        probLabel.style.color = isAI ? 'var(--neon-red)' : 'var(--neon-green)';
        // Forensic Summary
        const log = document.getElementById('detailed-log');
        let logHtml = '[FORENSIC SUMMARY]<br>';
        const forensicSummary = result.forensic_summary;
        if (forensicSummary?.points && Array.isArray(forensicSummary.points) && forensicSummary.points.length > 0) {
            forensicSummary.points.forEach(item => {
                logHtml += `- ${item}<br>`;
            });
            if (forensicSummary.conclusion) {
                logHtml += `<br>[CONCLUSION] ${forensicSummary.conclusion}`;
            }
        } else {
            logHtml += `- Result: ${isAI ? 'AI-Generated Video' : 'Authentic Video'}<br>`;
            logHtml += `- Method: ${result.source || 'Video AI Detector'}`;
        }
        log.innerHTML = logHtml;
        sessionStorage.removeItem('videoAnalysisResult');
    });
    </script>
</body>
</html>
