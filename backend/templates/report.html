<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Report</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Scan Report & Forensics</h1>
        <p class="subtitle">File: <span id="filename">Unknown</span></p>
        <div class="glass-card verdict-banner" id="verdict-banner">
            <div class="verdict-title" id="verdict-title">VERDICT: ANALYZING...</div>
            <div style="font-size: 0.9rem; margin-top: 5px;" id="verdict-reason">Processing results...</div>
        </div>

        <div class="breakdown-grid" style="margin-top: 2rem;">
            <div class="glass-card stat-box">
                <span class="stat-label">Final Verdict</span>
                <span class="stat-value" id="final-verdict" style="color: var(--neon-red);">AI Generated</span>
            </div>
            <div class="glass-card stat-box">
                <span class="stat-label">Confidence Score</span>
                <span class="stat-value red-text" id="confidence-score">98.5%</span>
            </div>
            <div class="glass-card stat-box">
                <span class="stat-label">Detection Method</span>
                <span class="stat-value" id="detection-method" style="color: var(--neon-blue);">Multi-Layer</span>
            </div>
        </div>

        <div class="glass-card forensic-layout" style="padding: 2rem; margin-top: 2rem;">
            <div style="text-align: center;">
                <div style="margin-bottom: 10px; color: #ccc;">Confidence Visualization</div>
                <div class="score-circle" id="score-circle">
                    <div class="score-inner" id="score-value">98.5%</div>
                </div>
            </div>
            <div class="detailed-log" id="detailed-log" style="margin-top: 0;">
                [LOG] Initializing analysis...<br>
            </div>
        </div>

        <br>
        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
            <button class="btn-glow" onclick="location.href='/dashboard'">Scan Another File</button>
            <button class="btn-glow" onclick="location.href='/'">Back to Main Page</button>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const resultJson = sessionStorage.getItem('analysisResult');
        if (!resultJson) {
            document.getElementById('verdict-title').textContent = 'NO DATA';
            document.getElementById('verdict-reason').textContent = 'No analysis result found. Please scan an image first.';
            return;
        }

        const result = JSON.parse(resultJson);
        document.getElementById('filename').textContent = result.filename || 'Unknown';

        const verdictBanner = document.getElementById('verdict-banner');
        const verdictTitle = document.getElementById('verdict-title');
        const verdictReason = document.getElementById('verdict-reason');
        const finalVerdict = document.getElementById('final-verdict');
        const confidenceScore = document.getElementById('confidence-score');
        const detectionMethod = document.getElementById('detection-method');

        const isAI = result.is_ai_generated;
        const confidence = result.confidence;

        if (isAI) {
            verdictTitle.textContent = 'VERDICT: AI-GENERATED';
            verdictTitle.style.color = 'var(--neon-red)';
            verdictBanner.style.borderColor = 'var(--neon-red)';
            verdictBanner.style.background = 'rgba(255, 42, 42, 0.1)';
            finalVerdict.textContent = 'AI Generated';
            finalVerdict.style.color = 'var(--neon-red)';
        } else {
            verdictTitle.textContent = 'VERDICT: AUTHENTIC';
            verdictTitle.style.color = 'var(--neon-green)';
            verdictBanner.style.borderColor = 'var(--neon-green)';
            verdictBanner.style.background = 'rgba(0, 255, 136, 0.1)';
            finalVerdict.textContent = 'Authentic';
            finalVerdict.style.color = 'var(--neon-green)';
        }

        verdictReason.textContent = result.final_verdict || 'Multi-layer forensic analysis';
        confidenceScore.textContent = confidence.toFixed(1) + '%';
        confidenceScore.style.color = isAI ? 'var(--neon-red)' : 'var(--neon-green)';

        if (result.layers?.c2pa?.c2pa_present) {
            detectionMethod.textContent = result.layers?.c2pa?.ai_generated
                ? 'C2PA'
                : 'C2PA Metadata Presence Policy';
        } else if (result.layers?.ai_model?.status === 'complete') {
            if (
                result.layers?.synthid?.status === 'complete' &&
                result.layers?.synthid?.is_watermarked &&
                result.layers?.ai_model?.label === 'AI Image'
            ) {
                detectionMethod.textContent = 'AI Model + SynthID';
            } else {
                detectionMethod.textContent = 'AI Model';
            }
        } else if (result.layers?.synthid?.status === 'complete' && result.layers?.synthid?.is_watermarked) {
            detectionMethod.textContent = 'SynthID';
        } else {
            detectionMethod.textContent = 'Multi-Layer';
        }

        // Score Circle
        const scoreValue = document.getElementById('score-value');
        scoreValue.textContent = confidence.toFixed(1) + '%';
        scoreValue.style.color = isAI ? 'var(--neon-red)' : 'var(--neon-green)';

        const scoreCircle = document.getElementById('score-circle');
        scoreCircle.style.background = `conic-gradient(${isAI ? 'var(--neon-red)' : 'var(--neon-green)'} ${confidence}%, transparent 0)`;
        scoreCircle.style.boxShadow = isAI ? '0 0 20px rgba(255, 42, 42, 0.3)' : '0 0 20px rgba(0, 255, 136, 0.3)';

        // Forensic Summary
        const detailedLog = document.getElementById('detailed-log');
        let logHtml = '[FORENSIC SUMMARY]<br>';
        const forensicSummary = result.forensic_summary;
        if (forensicSummary?.points && Array.isArray(forensicSummary.points) && forensicSummary.points.length > 0) {
            forensicSummary.points.forEach(item => {
                logHtml += `- ${item}<br>`;
            });
            if (forensicSummary.conclusion) {
                logHtml += `<br>[CONCLUSION] ${forensicSummary.conclusion}`;
            }
        } else if (result.layers) {
            if (result.layers.c2pa) {
                logHtml += `[C2PA] ${result.layers.c2pa.status || 'Checked'}<br>`;
            }
            if (result.layers.synthid) {
                logHtml += `[SynthID] ${result.layers.synthid.status || 'Checked'}<br>`;
            }
            if (result.layers.ai_model) {
                logHtml += `[AI Model] ${result.layers.ai_model.status || 'Checked'}<br>`;
            }
            logHtml += '<br>[CONCLUSION] Analysis completed.';
        }
        detailedLog.innerHTML = logHtml;

        sessionStorage.removeItem('analysisResult');
    });
    </script>
</body>
</html>
